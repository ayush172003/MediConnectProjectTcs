spring:
  application:
    name: mediconnect-backend
  datasource:
    url: jdbc:mysql://localhost:3306/mediconnect_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: password # To be updated with actual local DB password or env var
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  servlet:
    multipart:
      enabled: true
      max-file-size: 25MB
      max-request-size: 25MB

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration: 86400000 # 24 hours in milliseconds

server:
  port: 8080

logging:
  level:
    com.mediconnect: INFO

file:
  upload-dir: uploads/medical-docs
